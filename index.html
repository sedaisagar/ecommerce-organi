<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>


    <div class="container p-5">

        <div class="card m-2 p-3">
            <form action="https://rc-epay.esewa.com.np/api/epay/main/v2/form" method="POST">
                <input type="text" id="amount" name="amount" value="100" required>
                <input type="text" id="tax_amount" name="tax_amount" value="0" required>
                <input type="text" id="total_amount" name="total_amount" value="100" required>
                <input type="text" id="transaction_uuid" name="transaction_uuid" value="241028" required>
                <input type="text" id="product_code" name="product_code" value="EPAYTEST" required>
                <input type="text" id="product_service_charge" name="product_service_charge" value="0" required>
                <input type="text" id="product_delivery_charge" name="product_delivery_charge" value="0" required>
                <input type="text" id="success_url" name="success_url" value="https://developer.esewa.com.np/success"
                    required>
                <input type="text" id="failure_url" name="failure_url" value="https://developer.esewa.com.np/failure"
                    required>
                <input type="text" id="signed_field_names" name="signed_field_names"
                    value="total_amount,transaction_uuid,product_code" required>
                <input type="text" id="signature" name="signature" value="i94zsd3oXF6ZsSr/kGqT4sSzYQzjj1W/waxjWyRwaME="
                    required>
                <br>
                <button type="submit" class="btn btn-success"> Submit </button>
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/hmac-sha256.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/enc-base64.min.js"></script>
    <script>
        var message = `total_amount=100,transaction_uuid=11ab-201b-13c,product_code=EPAYTEST`;
        var hash = CryptoJS.HmacSHA256( message, "8gBm/:&EnhH.1/q" );
        var hashInBase64 = CryptoJS.enc.Base64.stringify( hash );
        console.log( hashInBase64 );
    </script>
</body>

</html>
